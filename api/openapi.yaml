  /api/v1/data-protection/sanitize:
    post:
      description: "<p>This API sanitizes input data based on the specified context\
        \ (HTML, JSON, CSV, LOG) and optional post-processing operations. It is designed\
        \ to prevent common security risks such as XSS, CSV injection, log injection,\
        \ and sensitive data exposure.</p><h4>Key Features</h4><ul><li>Context-aware\
        \ sanitization (HTML, JSON, CSV, LOG)</li><li>Detection and mitigation of\
        \ security threats (XSS, injection, PII exposure)</li><li>Post-processing\
        \ transformations (whitespace normalization, lowercase, accent removal)</li><li>Detailed\
        \ audit output: issues detected, actions applied, explanations</li><li>Risk\
        \ scoring system (LOW, MEDIUM, HIGH)</li></ul><h4>Use Cases</h4><ul><li>Sanitize\
        \ user-generated HTML content before rendering</li><li>Prevent CSV injection\
        \ before exporting data to Excel</li><li>Clean and normalize logs to prevent\
        \ log forging attacks</li><li>Mask sensitive data such as emails and phone\
        \ numbers</li></ul><h4>Request Parameters</h4><ul><li><b>input</b>: Raw input\
        \ string to sanitize</li><li><b>context</b>: Target context (HTML, JSON, CSV,\
        \ LOG)</li><li><b>mode</b>: Sanitization mode (RELAXED, STRICT, HARDENING)\
        \ necessary just for HTML context, ignored otherwise. Default value RELAXED</li><li><b>operations</b>:\
        \ Optional list of transformations (NORMALIZE_WHITESPACE, LOWERCASE, REMOVE_ACCENTS,\
        \ REMOVE_PII)</li></ul><h4>Response Fields</h4><ul><li><b>sanitized</b>: Final\
        \ processed output</li><li><b>contextApplied</b>: Applied context</li><li><b>issuesDetected</b>:\
        \ Security or data issues found</li><li><b>actionsApplied</b>: Operations\
        \ and sanitization steps executed</li><li><b>explanations</b>: Human-readable\
        \ explanations for detected issues</li><li><b>riskLevel</b>: LOW, MEDIUM,\
        \ HIGH</li><li><b>riskScore</b>: Numeric risk score (0–100)</li></ul><h4>Authentication:</h4>Requires\
        \ a valid <code>Bearer Token</code> in the Authorization header."
      operationId: sanitize
      requestBody:
        content:
          application/json:
            examples:
              HTML - XSS Removal:
                description: HTML - XSS Removal
                summary: Remove script tags and sanitize HTML
                value:
                  input: <script>alert('xss')</script><b>Hello</b>
                  context: HTML
                  mode: STRICT
              CSV - Injection Prevention:
                description: CSV - Injection Prevention
                summary: Prevent Excel formula execution
                value:
                  input: =SUM(A1:A2)
                  context: CSV
              LOG - Injection Prevention:
                description: LOG - Injection Prevention
                summary: Prevent log forging via newline removal
                value:
                  input: |-
                    User logged in
                    ERROR: hacked
                  context: LOG
              PII + Transformations:
                description: PII + Transformations
                summary: Mask e-mail and apply lowercase
                value:
                  input: "Contact: john.doe@example.com! Thank you"
                  context: HTML
                  operations:
                  - REMOVE_PII
                  - LOWERCASE
              Whitespace + Lowercase:
                description: Whitespace + Lowercase
                summary: Normalize spaces and convert to lowercase
                value:
                  input: '   Hello   WORLD   '
                  context: HTML
                  operations:
                  - NORMALIZE_WHITESPACE
                  - LOWERCASE
              Mixed Scenario (XSS + PII):
                description: Mixed Scenario (XSS + PII)
                summary: Real-world mixed sanitization case
                value:
                  input: "<script>alert(1)</script> Contact:    john.doe@example.coms"
                  context: HTML
                  operations:
                  - REMOVE_PII
                  - NORMALIZE_WHITESPACE
              JSON Sanitization:
                description: JSON Sanitization
                summary: Sanitize JSON content and remove PII
                value:
                  input: "{\"email\":\"user@test.com\",\"name\":\"Mario\"}"
                  context: JSON
                  operations:
                  - REMOVE_PII
            schema:
              $ref: "#/components/schemas/SanitizationRequest"
        description: "Sanitization request payload. Provide input data, target context,\
          \ optional mode and operations."
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                LOW Risk - Simple normalization:
                  description: LOW Risk - Simple normalization
                  summary: "No security issues, only transformations applied"
                  value:
                    sanitized: hello world
                    contextApplied: HTML
                    issuesDetected: []
                    actionsApplied:
                    - NORMALIZE_WHITESPACE
                    - LOWERCASE
                    riskLevel: LOW
                    riskScore: 0
                    explanations: []
                MEDIUM Risk - HTML sanitized:
                  description: MEDIUM Risk - HTML sanitized
                  summary: Unsafe HTML removed without explicit XSS patterns
                  value:
                    sanitized: <b>Hello</b>
                    contextApplied: HTML
                    issuesDetected:
                    - HTML_SANITIZED
                    actionsApplied:
                    - REMOVE_UNSAFE_HTML
                    riskLevel: MEDIUM
                    riskScore: 60
                    explanations:
                    - Sanitized HTML by removing potentially unsafe or disallowed
                      elements
                HIGH Risk - XSS + PII detected:
                  description: HIGH Risk - XSS + PII detected
                  summary: Multiple security issues detected and mitigated
                  value:
                    sanitized: "Contact: [EMAIL]! Thank you"
                    contextApplied: HTML
                    issuesDetected:
                    - XSS_SCRIPT_DETECTED
                    - PII_DETECTED
                    actionsApplied:
                    - REMOVE_SCRIPT_TAG
                    - REMOVE_PII
                    - NORMALIZE_WHITESPACE
                    riskLevel: HIGH
                    riskScore: 85
                    explanations:
                    - Removed <script> tag to prevent XSS
                    - Removed sensitive personal data (email/phone)
              schema:
                $ref: "#/components/schemas/SanitizationResult"
          description: Sanitization completed successfully
        "400":
          content:
            application/json:
              example:
                error: "Bad Request: your request contains invalid parameters."
                status: 400
                path: /api/v1/data-protection/example
                requestId: d9022416-c58a-7293-88bb-21acd7ab5d89
