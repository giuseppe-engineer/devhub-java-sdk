  /api/v1/convert/data/yaml-to-json:
    post:
      description: |-
        This endpoint accepts a valid YAML document and converts it into a JSON-formatted output. <br/>The conversion supports YAML objects, arrays, and scalar values as root elements.<h4>Key Features:</h4><ul><li>Validates input to ensure it is a well-formed YAML document before conversion</li><li>Supports YAML objects, arrays, and scalar root values</li><li>Preserves data types, structure, and nested content</li><li>Handles multiline values, numeric formats, and boolean representations correctly</li><li>Produces human-readable, pretty-printed JSON output</li></ul><h4>Use Cases:</h4><ul><li>Convert YAML configuration files into JSON format</li><li>Reformat YAML data for APIs or systems that require JSON input</li><li>Validate and normalize YAML content through JSON serialization</li></ul><h4>Examples:</h4><ul><li>Input YAML:<br/><code>server:
          port: 8080
          compression:
            enabled: true
            mime-types:
              - application/json
              - text/html</code><br/>Output JSON:<br/><code>{"server":{"port":8080,"compression":{"enabled":true,"mime-types":["application/json","text/html"]}}}</code></li></ul><h4>Validation:</h4>The input payload is strictly validated to ensure it represents a valid YAML document. Invalid or empty YAML content results in a <code>400 Bad Request</code> response.<br/><h4>Important Notes:</h4><ul><li>Request body must be valid YAML</li><li>Clients must not modify or sanitize the payload</li><li>Structural conversion only; no execution or evaluation of YAML content occurs</li></ul><h4>Authentication:</h4>Bearer token required in <code>Authorization</code> header.
      operationId: convertYamlToJson
      requestBody:
        content:
          text/plain:
            examples:
              Sample YAML:
                description: Sample YAML
                summary: Example input YAML
                value: |-
                  server:
                    port: 8080
                    compression:
                      enabled: true
                      mime-types:
                        - application/json
                        - text/html
            schema:
              description: "Any valid YAML document (object, array, or scalar value)"
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                server:
                  port: 8080
                  compression:
                    enabled: true
                    mime-types:
                    - application/json
                    - text/html
              schema:
                format: json
                type: string
          description: YAML successfully converted into JSON format
