  /api/v1/data-protection/validate:
    post:
      description: "<p>This API validates input data against a configurable set of\
        \ rules without modifying the original value. It is designed to enforce data\
        \ integrity, ensure format correctness, and detect potentially unsafe input\
        \ such as malicious patterns.</p><h4>Key Features</h4><ul><li>Supports multiple\
        \ validation rules (EMAIL, PHONE, URL, REGEX, etc.)</li><li>Flexible rule\
        \ configuration with parameters (e.g. MIN_LENGTH:8, MAX_LENGTH:50)</li><li>Fail-fast\
        \ or full validation modes</li><li>Built-in security checks (XSS and SQL injection\
        \ detection)</li><li>Extensible validation engine for custom rules</li></ul><h4>Use\
        \ Cases</h4><ul><li>Validate user input in forms (email, password, phone,\
        \ etc.)</li><li>Enforce backend validation rules before processing data</li><li>Detect\
        \ potentially malicious input (XSS, SQL injection)</li><li>Apply centralized\
        \ validation logic across multiple services</li></ul><h4>Request Parameters</h4><ul><li><b>input</b>:\
        \ Raw input string to validate</li><li><b>rules</b>: List of validation rules\
        \ to apply (e.g. REQUIRED, EMAIL, MIN_LENGTH:8, REGEX:...)</li><li><b>failFast</b>:\
        \ If true, stops validation at the first detected error (default: false)</li></ul><h4>Supported\
        \ Rules</h4><ul><li><b>REQUIRED</b>: Ensures input is not null or empty</li><li><b>EMAIL</b>:\
        \ Validates email format</li><li><b>PHONE</b>: Validates phone number format</li><li><b>URL</b>:\
        \ Validates URL format</li><li><b>MIN_LENGTH:n</b>: Minimum input length</li><li><b>MAX_LENGTH:n</b>:\
        \ Maximum input length</li><li><b>REGEX:pattern</b>: Custom regex validation</li><li><b>NO_XSS</b>:\
        \ Detects potential XSS patterns</li><li><b>NO_SQL_INJECTION</b>: Detects\
        \ SQL injection patterns</li></ul><h4>Authentication:</h4>Requires a valid\
        \ <code>Bearer Token</code> in the Authorization header."
      operationId: validate
      requestBody:
        content:
          application/json:
            examples:
              Email validation:
                description: Email validation
                value:
                  input: test@example.com
                  rules:
                  - REQUIRED
                  - EMAIL
              Password policy:
                description: Password policy
                value:
                  input: abc123
                  rules:
                  - MIN_LENGTH:8
                  - "REGEX:^(?=.*[A-Z]).+$"
              Security validation:
                description: Security validation
                value:
                  input: <script>alert(1)</script>
                  rules:
                  - NO_XSS
              Phone validation with length constraints:
                description: Phone validation with length constraints
                value:
                  input: +39 347 1234567
                  rules:
                  - PHONE
              Text validation with length constraints:
                description: Text validation with length constraints
                value:
                  input: My simple text to evaluate
                  rules:
                  - MIN_LENGTH:5
                  - MIN_LENGTH:20
              URL validation:
                description: URL validation
                value:
                  input: https://example.com
                  rules:
                  - URL
              Mixed validation with invalid rule handling:
                description: Mixed validation with invalid rule handling
                value:
                  input: admin' OR 1=1
                  rules:
                  - NO_SQL_INJECTION
                  - UNKNOWN_RULE
                  - MIN_LENGTH:5
            schema:
              $ref: "#/components/schemas/ValidateRequest"
        description: Validate request payload. Provide input data and list of rules
          necessary to validate data.
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                VALID - All rules passed:
                  description: VALID - All rules passed
                  summary: Input satisfies all validation rules
                  value:
                    valid: true
                    errors: []
                INVALID - Multiple validation errors:
                  description: INVALID - Multiple validation errors
                  summary: Input fails multiple rules including security and invalid
                    rule
                  value:
                    valid: false
                    errors:
                    - rule: NO_SQL_INJECTION
                      message: Potential SQL injection detected
                    - rule: INVALID_RULE
                      message: "Unknown validation rule: UNKNOWN_RULE"
                    - rule: MIN_LENGTH
                      message: Minimum length is 8
              schema:
                $ref: "#/components/schemas/ValidateResponse"
          description: Validation completed successfully
        "400":
          content:
            application/json:
              example:
                error: "Bad Request: your request contains invalid parameters."
                status: 400
                path: /api/v1/data-protection/example
                requestId: d9022416-c58a-7293-88bb-21acd7ab5d89
                supportCode: DATA_PROTECTION_001
                timestamp: 2026-04-15T22:32:27.345
              schema:
                $ref: "#/components/schemas/DevHubErrorResponse"
          description: Invalid input or CSV formatting options
        "401":
          content:
            application/json:
              example:
                error: "Unauthorized: authentication is required or failed."
                status: 401
                path: /api/v1/data-protection/example
                requestId: d9022416-c58a-7293-88bb-21acd7ab5d89
                supportCode: DATA_PROTECTION_001
                timestamp: 2026-04-15T22:32:27.345
              schema:
                $ref: "#/components/schemas/DevHubErrorResponse"
          description: Unauthorized
