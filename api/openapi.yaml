  /api/v1/convert/data/xml-to-json:
    post:
      description: "This endpoint converts a well-formed XML document into a JSON\
        \ representation, preserving structure, hierarchy, attributes, and text content.<br/><h4>Key\
        \ Features:</h4><ul><li>Preserves XML element hierarchy and structure</li><li>Converts\
        \ XML attributes using <code>@attribute</code> notation</li><li>Supports text\
        \ nodes and mixed content using <code>#text</code> notation</li><li>Automatically\
        \ groups repeated XML elements into JSON arrays</li><li>Optional array stabilization\
        \ via <code>forceArray</code> parameter</li><li>Optional namespace removal\
        \ via <code>stripNamespaces</code> parameter</li><li>Outputs formatted, human-readable\
        \ JSON</li></ul><h4>Use Cases:</h4><ul><li>Transform XML payloads into JSON\
        \ for modern REST or frontend applications</li><li>Integrate legacy XML-based\
        \ systems with JSON-driven architectures</li><li>Normalize XML responses for\
        \ SDKs and strongly typed clients</li></ul><h4>Validation:</h4>The input payload\
        \ is strictly validated to ensure it is a valid XML document.<br/><br/><h4>Notes:</h4>Swagger\
        \ UI may display a placeholder XML example for this endpoint. This does not\
        \ reflect the actual request payload handling or conversion behavior.<br/>When\
        \ enabled, <code>forceArray</code> ensures a stable JSON schema, which is\
        \ particularly useful for strongly typed clients and SDKs.<br/><br/><h4>Authentication:</h4>This\
        \ endpoint requires a valid <code>Bearer Token</code> in the <code>Authorization</code>\
        \ header."
      operationId: convertXmlToJson
      parameters:
      - description: "When enabled, XML elements that may occur multiple times under\
          \ the same parent are always represented as JSON arrays, even if only a\
          \ single occurrence is present in the input. Singular, non-repeating elements\
          \ are never converted into arrays."
        explode: true
        in: query
        name: forceArray
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: "When enabled, XML namespace prefixes are removed from element\
          \ and attribute names during conversion. The namespace URI information is\
          \ discarded, resulting in cleaner and more readable JSON keys. When disabled,\
          \ namespace prefixes are preserved. This option is useful when namespace\
          \ information is not required by the consumer."
        explode: true
        in: query
        name: stripNamespaces
        required: false
        schema:
          default: false
          type: boolean
        style: form
      requestBody:
        content:
          text/plain:
            examples:
              With root element:
                description: With root element
                summary: Standard XML document
                value: |-
                  <?xml version="1.0" encoding="UTF-8"?>
                  <root>
                    <user>
                      <name>Alice</name>
                      <age>30</age>
                    </user>
                  </root>
              Attributes and mixed content:
                description: Attributes and mixed content
                summary: XML with attributes and text nodes
                value: |-
                  <book category="learning" cover="paperback">
                    <title lang="en">Learning XML</title>
                    <author>Team DevHub</author>
                  </book>
            schema:
              description: XML payload (shown as plain text for documentation purposes)
              type: string
        description: "Raw XML payload to be converted into JSON.<br/><ul><li>The XML\
          \ document is processed as-is</li><li>The root element is preserved as the\
          \ top-level JSON key</li><li>No predefined XML schema is enforced</li><li>Mixed\
          \ XML content is preserved using the <code>#text</code> field when text\
          \ nodes and child elements coexist.</li><li>Empty XML elements are converted\
          \ to empty JSON objects.</li><li>If an element occurs once, it is mapped\
          \ as a single value; if repeated, it is mapped as an array.When <code>forceArray</code>\
          \ is enabled, elements are always represented as arrays.</li><li>XML namespaces\
          \ are preserved in element and attribute names.</li></ul><strong>Note:</strong><br/>Swagger\
          \ UI may display a placeholder XML example (\"XML example cannot be generated;\
          \ root element name is undefined\"). This is a limitation of Swagger UI\
          \ and does not reflect the actual request payload accepted by the API."
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                Sample JSON:
                  description: Sample JSON
                  summary: Example converted JSON
                  value:
                    user:
                      name: Alice
                      age: 30
                      roles:
                      - admin
                      - editor
                    active: true
                    createdAt: 2025-11-01T12:30:00Z
              schema:
                description: Generated JSON document
                format: json
                type: string
          description: Conversion successful
        "400":
          content:
