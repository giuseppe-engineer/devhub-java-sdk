components:
  parameters:
    XRequestIdHeader:
      description: Optional request correlation id (UUID)
      explode: false
      in: header
      name: X-Request-Id
      required: false
      schema:
        format: uuid
      style: simple
  schemas:
    Text:
      description: A generic object that accepts a text as only parameter
      example:
        text: text
      properties:
        text:
          description: The generic text to process
          type: string
    DevHubErrorResponse:
      description: Standard error response for DevHub APIs
      example:
        path: /api/v1/example/api-example
        requestId: c7a8b1c0-8c8a-4c4f-b8a1-9a2f4d5c6e7f
        error: The requested resource was not found.
        supportCode: supportCode
        status: 404
        timestamp: 2026-01-11T15:42:10.123
      properties:
        error:
          description: Human-readable error message
          example: The requested resource was not found.
          type: string
        status:
          description: HTTP status code
          example: 404
          format: int32
          type: integer
        path:
          description: API path that generated the error
          example: /api/v1/example/api-example
          type: string
        requestId:
          description: Unique request identifier for log correlation
          example: c7a8b1c0-8c8a-4c4f-b8a1-9a2f4d5c6e7f
          type: string
        supportCode:
          description: Support error code used for troubleshooting and documentation
          type: string
        timestamp:
          description: Timestamp of the error occurrence
          example: 2026-01-11T15:42:10.123
          type: string
    PasswordRequest:
      description: Request body for generating custom random passwords
      example:
        includeNumbers: true
        excludedSpecials: excludedSpecials
        strength: strength
        includeLetters: true
        includeSpecials: true
        length: 0
      properties:
        length:
          format: int32
          type: integer
        strength:
          type: string
        includeLetters:
          type: boolean
        includeNumbers:
          type: boolean
        includeSpecials:
          type: boolean
        excludedSpecials:
          type: string
    PasswordResponse:
      description: Response containing the generated password
      example:
        password: aB8@dF9!pT3#
      properties:
        password:
          description: Password generated according to the specified criteria
          example: aB8@dF9!pT3#
          type: string
    AuthResponse:
      description: Standard response in witch is present Bearer token
      example:
        accessToken: accessToken
        tokenType: tokenType
        refreshToken: refreshToken
      properties:
        accessToken:
          description: The JWT access token to authenticate to APIs
          type: string
        tokenType:
          description: "Token type, always 'Bearer'"
          type: string
        refreshToken:
          description: Optional refresh token to obtain new access token
          type: string
    RefreshTokenRequest:
      description: Request containing refresh token to obtain a new access token
      example:
        refreshToken: refreshToken
      properties:
        refreshToken:
          description: Refresh token issued at login
          type: string
    AuthRequest:
      description: Standard request to log-in and receive Bearer token
      example:
        password: password
        username: username
      properties:
        username:
          description: Username credential
          type: string
        password:
          description: Password credential
          type: string
    ValidateRequest:
      example:
        input: input
        rules:
        - rules
        - rules
        failFast: true
      properties:
        input:
          type: string
        rules:
          items:
            type: string
          type: array
        failFast:
          type: boolean
    ValidateResponse:
      example:
        valid: true
        errors:
        - rule: rule
          message: message
        - rule: rule
          message: message
      properties:
        valid:
          type: boolean
        errors:
          items:
            $ref: "#/components/schemas/ValidationError"
          type: array
    ValidationError:
      example:
        rule: rule
        message: message
      properties:
        rule:
          type: string
        message:
          type: string
    SanitizationRequest:
      example:
        mode: mode
        input: input
        operations:
        - NONE
        - NONE
        context: context
      properties:
        input:
          type: string
        context:
          type: string
        mode:
          type: string
        operations:
          items:
            enum:
            - NONE
            - NORMALIZE_WHITESPACE
            - LOWERCASE
            - REMOVE_ACCENTS
            - REMOVE_PII
            type: string
          type: array
    SanitizationResult:
      example:
        riskLevel: riskLevel
        sanitized: sanitized
        actionsApplied:
        - actionsApplied
        - actionsApplied
        explanations:
        - explanations
        - explanations
        riskScore: 0
        contextApplied: HTML
        issuesDetected:
        - issuesDetected
        - issuesDetected
      properties:
        sanitized:
          type: string
        contextApplied:
          enum:
          - HTML
          - JSON
          - CSV
          - LOG
          type: string
        issuesDetected:
          items:
            type: string
          type: array
        actionsApplied:
          items:
            type: string
          type: array
        riskLevel:
          type: string
        riskScore:
          format: int32
          type: integer
        explanations:
          items:
            type: string
          type: array
    UUIDResponse:
      description: Response containing the generated UUIDs
      example:
        uuid:
        - uuid
        - uuid
      properties:
        uuid:
          items:
            type: string
          type: array
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http

