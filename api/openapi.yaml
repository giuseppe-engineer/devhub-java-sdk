  /api/v1/convert/data/json-to-xml:
    post:
      description: "This endpoint converts a well-formed JSON object or array into\
        \ an XML document.<br/><h4>Key Features:</h4><ul><li>Preserves JSON hierarchy\
        \ and structure in XML format</li><li>Supports nested objects, arrays, and\
        \ primitive values</li><li>If the input JSON has a single top-level property,\
        \ it is used as the XML root element. If multiple properties or an array are\
        \ present, a synthetic <code>&lt;root&gt;</code> element is generated</li><li>Outputs\
        \ indented, human-readable XML</li><li>Supports XML attributes using <code>@attribute</code>\
        \ notation</li><li>Supports text nodes using <code>#text</code> notation</li><li>Automatically\
        \ escapes XML-sensitive characters in values</li><li>Configurable array handling\
        \ via <code>arrayMode</code> parameter (<code>FLAT</code> or <code>WRAPPED</code>)</li></ul><h4>Use\
        \ Cases:</h4><ul><li>Generate XML from JSON configuration or API responses</li><li>Integrate\
        \ RESTful JSON data with legacy XML-based systems</li><li>Transform microservice\
        \ outputs for SOAP or XML-driven workflows</li></ul><h4>Validation:</h4>The\
        \ input is strictly validated to ensure it is a valid JSON document.<br/><br/><h4>Authentication:</h4>This\
        \ endpoint requires a valid <code>Bearer Token</code> in the <code>Authorization</code>\
        \ header."
      operationId: convertJsonToXml
      parameters:
      - description: "Controls how JSON arrays are represented in the generated XML\
          \ output.<br/><ul><li><code>FLAT</code>: each array element is rendered\
          \ as a repeated XML element with the same tag name</li><li><code>WRAPPED</code>:\
          \ array elements are wrapped inside a parent element and rendered as <code>&lt;item&gt;</code>\
          \ child nodes</li></ul>If not specified, the default behavior is <code>FLAT</code>."
        explode: true
