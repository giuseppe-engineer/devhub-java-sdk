        \ as empty cells</li></ul><h4>Use Cases:</h4><ul><li>Export frontend JSON\
        \ data to CSV/Excel</li><li>Generate reports from API responses</li><li>Transform\
        \ logs or datasets into tabular format</li></ul><h4>Examples:</h4><ul><li><code>/json-to-csv?delimiter=SEMICOLON</code>\
