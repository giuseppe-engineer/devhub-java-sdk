  /api/v1/tools/password:
    post:
      description: "Generates a secure and customizable password using either predefined\
        \ strength presets or manual composition rules.<br/><br/><h4>Key Features:</h4><ul><li>Four\
        \ strength presets: <b>WEAK</b>, <b>MEDIUM</b>, <b>STRONG</b>, <b>ULTRA</b></li><li>Optional\
        \ manual configuration (letters, numbers, special characters)</li><li>Selective\
        \ exclusion of specific special characters</li><li>Uses <code>SecureRandom</code>\
        \ for cryptographic-grade randomness</li></ul><h4>Behavior:</h4><ul><li>If\
        \ <code>strength</code> is provided, manual parameters are ignored.</li><li>When\
        \ using a predefined strength, at least one character per category is guaranteed.</li><li>Excluded\
        \ special characters are fully removed from generation.</li></ul><h4>Authentication:</h4>Requires\
        \ a valid <code>Bearer Token</code> in the Authorization header."
      operationId: generatePassword
      requestBody:
        content:
          application/json:
            examples:
              Strong preset:
                description: Strong preset
                value:
                  strength: STRONG
                  excludedSpecials: .@|!
              Ultra preset:
                description: Ultra preset
                value:
                  strength: ULTRA
              Manual configuration:
                description: Manual configuration
                value:
                  length: 12
                  includeLetters: true
                  includeNumbers: false
                  includeSpecials: true
                  excludedSpecials: '!@#'
            schema:
              $ref: "#/components/schemas/PasswordRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                password: A6d!bXy3@qP9
              schema:
                $ref: "#/components/schemas/PasswordResponse"
          description: Password successfully generated
