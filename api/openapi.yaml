                status: 400
                path: /api/v1/convert/data/example
                requestId: d7032406-b49e-4786-96cc-42cda8dc6e45
                supportCode: DATA_CONVERSION_001
                timestamp: 2026-01-11T15:42:10.123
              schema:
                $ref: "#/components/schemas/DevHubErrorResponse"
          description: Invalid or empty or unsafe XML input
        "401":
          content:
            application/json:
              example:
                error: "Unauthorized: authentication is required or failed."
