  /api/v1/tools/uuid:
    get:
      description: "Generates UUID version 4 (random) or version 5 (deterministic,\
        \ namespace-based).<br/><br/><h4>Key Features:</h4><ul><li>Generate between\
        \ 1 and 100 UUIDs for v4</li><li>Generate deterministic UUID v5 using namespace\
        \ + name</li><li>Suitable for unique identifiers or reproducible resource\
        \ IDs</li></ul><h4>Behavior:</h4><ul><li>Default version is <b>v4</b></li><li>For\
        \ <b>v5</b>, both <code>namespace</code> and <code>name</code> are required</li><li>UUID\
        \ v5 is deterministic: same namespace + name → same UUID</li><li>For v5, <code>count</code>\
        \ must be exactly <b>1</b></li></ul><h4>Authentication:</h4>Requires a valid\
        \ <code>Bearer Token</code> in the Authorization header."
      operationId: generateUuid
      parameters:
      - description: "UID version to generate. Must be <b>v4</b> for random UUID (non-deterministic)\
          \ or <b>v5</b> for namespaced UUID (deterministic, based on namespace +\
          \ name). Default value is <code>v4</code>"
        example: v4
        explode: true
        in: query
        name: version
        required: false
        schema:
          default: v4
          type: string
        style: form
      - description: Number of UUIDs to generate. Must be between <b>1</b> and <b>100</b>
          for <b>v4</b> and exactly <b>1</b> to <b>v5</b> (deterministic generation).
          Default value is <code>1</code>
        example: 5
        explode: true
        in: query
        name: count
        required: false
        schema:
          default: 1
          format: int32
          type: integer
        style: form
      - description: Required only for <b>v5</b> (namespaced deterministic generation).
          No strict UUID format required
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      - description: Name value used for UUID v5 generation. Required only when <code>version
          = v5</code>. The same <code>namespace</code> + <code>name</code> combination
          will always generate the same UUID
        explode: true
        in: query
        name: name
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Sample UUID Response v4:
                  description: Sample UUID Response v4
                  summary: Example output for generating UUID(s) v4
                  value:
                    uuid:
                    - 416f3eed-71df-4bed-8607-8ef09557e087
                    - 2511a22a-641a-44e0-b287-6e8e1b0321b5
                    - 33d61268-62aa-4be7-bfa9-fb5d1f241ad0
                Sample UUID Response v5:
                  description: Sample UUID Response v5
                  summary: Example output for generating UUID v5
                  value:
                    uuid:
                    - f5f460e6-0f18-49b2-9b02-6c27ba1e42dd
              schema:
                $ref: "#/components/schemas/UUIDResponse"
          description: UUID(s) successfully generated
        "400":
          content:
            application/json:
              example:
                error: "Bad Request: your request contains invalid parameters."
                status: 400
                path: /api/v1/tools/example
                requestId: c7a8b1c0-8c8a-4c4f-b8a1-9a2f4d5c6e7f
                supportCode: TOOLS_001
                timestamp: 2026-01-11T15:42:10.123
              schema:
                $ref: "#/components/schemas/DevHubErrorResponse"
          description: Invalid input
        "401":
          content:
            application/json:
              example:
                error: "Unauthorized: authentication is required or failed."
                status: 401
                path: /api/v1/tools/example
                requestId: c7a8b1c0-8c8a-4c4f-b8a1-9a2f4d5c6e7f
                supportCode: TOOLS_001
                timestamp: 2026-01-11T15:42:10.123
              schema:
                $ref: "#/components/schemas/DevHubErrorResponse"
          description: Unauthorized
        "403":
          content:
            application/json:
              example:
                error: "Forbidden: you do not have permission to access this resource."
                status: 403
                path: /api/v1/tools/example
                requestId: c7a8b1c0-8c8a-4c4f-b8a1-9a2f4d5c6e7f
                supportCode: TOOLS_001
                timestamp: 2026-01-11T15:42:10.123
              schema:
                $ref: "#/components/schemas/DevHubErrorResponse"
          description: Forbidden
        "429":
          content:
            application/json:
              example:
                error: "Too Many Requests: you have exceeded your rate limit."
                status: 429
                path: /api/v1/tools/example
                requestId: c7a8b1c0-8c8a-4c4f-b8a1-9a2f4d5c6e7f
                supportCode: TOOLS_001
                timestamp: 2026-01-11T15:42:10.123
              schema:
                $ref: "#/components/schemas/DevHubErrorResponse"
          description: Too many request
        "500":
          content:
            application/json:
              example:
                error: "Internal Server Error: something went wrong on the server."
                status: 500
                path: /api/v1/tools/example
                requestId: c7a8b1c0-8c8a-4c4f-b8a1-9a2f4d5c6e7f
                supportCode: TOOLS_001
                timestamp: 2026-01-11T15:42:10.123
              schema:
                $ref: "#/components/schemas/DevHubErrorResponse"
