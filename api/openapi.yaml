    post:
      description: "This endpoint converts a JSON array of flat objects into a CSV\
        \ text with customizable formatting.<br/>The CSV output is compatible with\
        \ Excel by default using semicolon as delimiter.<br/><h4>Key Features:</h4><ul><li>Custom\
        \ CSV formatting via query parameters</li><li>Supported delimiters: COMMA,\
        \ SEMICOLON, PIPE, TAB</li><li>Configurable quote mode and quote character</li><li>Automatic\
