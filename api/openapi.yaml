  /api/v1/convert/data/csv-to-json:
    post:
      description: "This endpoint converts a CSV text payload into a JSON array of\
        \ objects. CSV parsing behavior can be customized using query parameters such\
        \ as delimiter, quote mode, and header handling. The first CSV row must contain\
        \ column headers.<br/><h4>Key Features:</h4><ul><li>Supports CSV input as\
        \ plain text (not file upload)</li><li>Custom delimiter: comma, semicolon,\
        \ pipe, tab</li><li>Configurable quote mode and quote character</li><li>Mandatory\
        \ header row to ensure deterministic JSON output</li><li>Automatic type inference\
        \ (boolean, number, date, datetime)</li><li>Empty fields are converted to\
        \ <code>null</code></li><li>Numeric values with leading zeros are preserved\
        \ as strings</li></ul><h4>Use Cases:</h4><ul><li>Convert user-uploaded CSV\
        \ data to structured JSON</li><li>Normalize CSV datasets for API consumption</li><li>Preprocess\
        \ tabular data for analytics or validation</li></ul><h4>Examples:</h4><ul><li><code>/csv-to-json?delimiter=COMMA&quoteMode=MINIMAL&quoteChar=DOUBLE_QUOTE</code><br/>Standard\
        \ CSV with quoted fields containing commas</li><li><code>/csv-to-json?delimiter=SEMICOLON&quoteMode=NONE</code><br/>Excel-compatible\
        \ CSV with no quoting</li><li><code>/csv-to-json?delimiter=PIPE&firstRowAsHeader=false</code><br/>Pipe-delimited\
        \ CSV without header row</li></ul><h4>Authentication:</h4>This endpoint requires\
        \ a valid <code>Bearer Token</code> in the <code>Authorization</code> header."
      operationId: convertCsvToJson
      parameters:
      - description: CSV delimiter character. Default value is SEMICOLON.
        explode: true
        in: query
        name: delimiter
        required: false
        schema:
          default: SEMICOLON
          enum:
          - COMMA
          - SEMICOLON
          - PIPE
          - TAB
          type: string
        style: form
      - description: Defines how quoted fields are handled. Default value is NONE.
        explode: true
        in: query
        name: quoteMode
        required: false
        schema:
